# Klaro AI — GCP Cloud Build Configuration
# Builds and deploys both backend (Cloud Run) and frontend (Cloud Storage)
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_BACKEND_SERVICE=klaro-api,_FRONTEND_BUCKET=klaro-ai-frontend

substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: klaro-api
  _FRONTEND_BUCKET: klaro-ai-frontend

steps:
  # ── Step 1: Build the backend Docker image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA",
        "-t",
        "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest",
        "-f",
        "Dockerfile",
        ".",
      ]

  # ── Step 2: Push backend image to Container Registry ──
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA"]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest"]

  # ── Step 3: Deploy backend to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_BACKEND_SERVICE}"
      - "--image"
      - "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--timeout"
      - "300s"
      - "--concurrency"
      - "80"
      - "--set-env-vars"
      - "NODE_ENV=production,PORT=8080"

  # ── Step 4: Build the frontend ──
  - name: "node:20-alpine"
    entrypoint: sh
    args:
      - "-c"
      - |
        npm ci
        npm run build
    env:
      - "VITE_API_URL=" # Leave empty for relative calls if possible, or set to fixed domain

  # ── Step 5: Deploy frontend to Cloud Storage ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: sh
    args:
      - "-c"
      - |
        gsutil -m rsync -r -d dist/ gs://${_FRONTEND_BUCKET}/

images:
  - "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
